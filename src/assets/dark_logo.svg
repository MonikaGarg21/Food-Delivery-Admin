<svg width="220" height="72" viewBox="0 0 220 72" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Tomato Food Delivery">
  <title>Tomato Food Delivery</title>

  <!-- Steam wisps -->
  <path d="M26 26 Q22 20 26 14" fill="none" stroke="#c43d18" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M31 24 Q28 18 31 12" fill="none" stroke="#c43d18" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M36 26 Q40 20 36 14" fill="none" stroke="#c43d18" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Leaves -->
  <ellipse cx="26" cy="31" rx="9" ry="5" fill="#1f5c37" transform="rotate(-30 26 31)"/>
  <ellipse cx="37" cy="31" rx="9" ry="5" fill="#2d7a4a" transform="rotate(30 37 31)"/>
  <ellipse cx="31.5" cy="29" rx="5" ry="9" fill="#2d7a4a"/>

  <!-- Tomato body -->
  <circle cx="31.5" cy="50" r="22" fill="#e8552d"/>

  <!-- Shine highlights -->
  <ellipse cx="25" cy="42" rx="6" ry="4" fill="rgba(255,255,255,0.28)" transform="rotate(-20 25 42)"/>
  <ellipse cx="38" cy="45" rx="3" ry="2" fill="rgba(255,255,255,0.18)" transform="rotate(10 38 45)"/>

  <!-- Wordmark -->
  <text x="66" y="50"
    font-family="Georgia, 'Playfair Display', serif"
    font-size="28"
    font-weight="700"
    fill="#1a1916">tomato</text>

  <!-- Tagline -->
  <text x="68" y="64"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="10"
    font-weight="500"
    fill="#6b6560"
    letter-spacing="2">FOOD DELIVERY</text>
</svg>
